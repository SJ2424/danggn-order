name: Fetch OMS tracking

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: '시험 모드 (체크하면 실제 DB 업데이트 X, 화면 캡처만)'
        type: boolean
        default: false
  schedule:
    # 평일 — 12시대(결제 확인) + 오후(송장 수집) 겸용
    # 12:08/12:33/12:48: OMS 결제상태 읽어서 결제완료 자동 처리 (13시 마감 전 확인)
    #   → 각각 직후 12:10/12:35/12:50 send-push가 미결제 알람
    # 14:00/16:00: 송장 + 결제 둘 다
    - cron: '8 3 * * 1-5'   # 12:08 KST — 결제 확인 1차
    - cron: '33 3 * * 1-5'  # 12:33 KST — 결제 확인 2차
    - cron: '48 3 * * 1-5'  # 12:48 KST — 결제 확인 3차 (마감 직전)
    - cron: '0 5 * * 1-5'   # 14:00 KST — 송장 수집 1차
    - cron: '0 7 * * 1-5'   # 16:00 KST — 송장 수집 2차

# 동시 실행 방지 — 16:02 봇이 길어져 17:02와 겹치면 OMS 동시 로그인 / DB 중복 update 위험
concurrency:
  group: fetch-tracking
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        working-directory: bot
        run: npm install

      - name: Install Playwright Chromium
        working-directory: bot
        run: npx playwright install --with-deps chromium

      - name: Run fetch-tracking bot
        working-directory: bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OMS_USERNAME: ${{ secrets.OMS_USERNAME }}
          OMS_PASSWORD: ${{ secrets.OMS_PASSWORD }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: node fetch-tracking.js

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tracking-screenshots-${{ github.run_id }}
          path: bot/screenshots/
          if-no-files-found: ignore
          retention-days: 7
