name: Fetch OMS tracking

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: '시험 모드 (체크하면 실제 DB 업데이트 X, 화면 캡처만)'
        type: boolean
        default: false
  schedule:
    # 평일 16:00, 17:00 KST 2회 (송장 수집 — 시간 여유 있어 정시 OK, cron-job.org 백업도 있음)
    - cron: '0 7 * * 1-5'   # 16:00 KST
    - cron: '0 8 * * 1-5'   # 17:00 KST

# 동시 실행 방지 — 16:02 봇이 길어져 17:02와 겹치면 OMS 동시 로그인 / DB 중복 update 위험
concurrency:
  group: fetch-tracking
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        working-directory: bot
        run: npm install

      - name: Install Playwright Chromium
        working-directory: bot
        run: npx playwright install --with-deps chromium

      - name: Run fetch-tracking bot
        working-directory: bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OMS_USERNAME: ${{ secrets.OMS_USERNAME }}
          OMS_PASSWORD: ${{ secrets.OMS_PASSWORD }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: node fetch-tracking.js

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tracking-screenshots-${{ github.run_id }}
          path: bot/screenshots/
          if-no-files-found: ignore
          retention-days: 7
