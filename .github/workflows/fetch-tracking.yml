name: Fetch OMS tracking

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: '시험 모드 (실제 DB 업데이트 X, 화면 캡처만)'
        type: boolean
        default: true
  schedule:
    # 평일 16:00 ~ 18:00 KST 5회 (16:00 추가, 송장 발급 빠른 케이스 잡음)
    # GitHub Actions 정시 트래픽 지연 회피용 슬라이트 offset
    - cron: '2,32 7 * * 1-5'   # 16:02, 16:32 KST
    - cron: '2,32 8 * * 1-5'   # 17:02, 17:32 KST
    - cron: '2 9 * * 1-5'      # 18:02 KST

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        working-directory: bot
        run: npm install

      - name: Install Playwright Chromium
        working-directory: bot
        run: npx playwright install --with-deps chromium

      - name: Run fetch-tracking bot
        working-directory: bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OMS_USERNAME: ${{ secrets.OMS_USERNAME }}
          OMS_PASSWORD: ${{ secrets.OMS_PASSWORD }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: node fetch-tracking.js

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tracking-screenshots-${{ github.run_id }}
          path: bot/screenshots/
          if-no-files-found: ignore
          retention-days: 7
