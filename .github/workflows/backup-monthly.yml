name: Monthly auto backup (CSV → repo)

on:
  workflow_dispatch:
  schedule:
    # 매월 1일 02:00 KST (= 전월 마지막 날 17:00 UTC)
    - cron: '0 17 1 * *'

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        working-directory: bot
        run: npm install
      - name: Generate CSV backup
        working-directory: bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node backup-orders.js
      - name: Commit backup to repo
        run: |
          git config user.name "backup-bot"
          git config user.email "backup@noreply.github.com"
          git add bot/backups/
          if git diff --staged --quiet; then
            echo "변경 없음 — commit 생략"
          else
            git commit -m "Monthly backup $(TZ=Asia/Seoul date +%Y-%m)"
            git push
          fi
