name: Register cart site orders

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: '시험 모드 (체크하면 실제 등록 X, 화면 캡처만)'
        type: boolean
        default: false
  schedule:
    # 평일 2회 — 선반랙 봇과 동일 (08:02 / 11:50 KST). 11:50 이후는 수동
    - cron: '1 23 * * 0-4'   # 08:01 KST (화면엔 08:00 표시)
    - cron: '50 2 * * 1-5'   # 11:50 KST — 오전 최종

# 동시 실행 방지 — 중복 등록 위험 차단
concurrency:
  group: register-cart
  cancel-in-progress: false

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        working-directory: bot
        run: npm install
      - name: Install Playwright Chromium
        working-directory: bot
        run: npx playwright install --with-deps chromium
      - name: Run cart register bot
        working-directory: bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: node register-cart.js
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cart-screenshots-${{ github.run_id }}
          path: bot/screenshots/
          if-no-files-found: ignore
          retention-days: 7
