name: Register OMS orders

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: '시험 모드 (체크하면 실제 등록 X, 화면 캡처만)'
        type: boolean
        default: false
  schedule:
    # 평일 2회 — 아침 + 오전 최종 (11:50 이후는 수동 발주)
    # 운영 흐름: 11:50 자동 발주 → 12시부터 OMS 결제 → 13:00 발송 마감
    #            11:50 이후 들어온 주문은 [🤖 발주] 수동 버튼으로 즉시 처리
    - cron: '59 22 * * 0-4'  # 07:59 KST (전날 22:59 UTC) — 새벽~아침 모인 거
    - cron: '50 2 * * 1-5'   # 11:50 KST — 오전 최종 (12시 결제 대비)

# 동시 실행 방지 — 한 인스턴스가 도는 중에 다음 cron 트리거되면 큐에 대기
concurrency:
  group: register-orders
  cancel-in-progress: false

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install bot dependencies
        working-directory: bot
        run: npm install

      - name: Install Playwright Chromium
        working-directory: bot
        run: npx playwright install --with-deps chromium

      - name: Run register bot
        working-directory: bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OMS_USERNAME: ${{ secrets.OMS_USERNAME }}
          OMS_PASSWORD: ${{ secrets.OMS_PASSWORD }}
          # 푸시 알림용 (등록 직후 관리자에게 '결제하세요' 알림 보냄)
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          DRY_RUN: ${{ inputs.dry_run }}
          # 수동 실행이면 푸시 시간 가드 우회 (관리자가 결과 보고 싶어서 누른 거라)
          MANUAL_RUN: ${{ github.event_name == 'workflow_dispatch' }}
        run: node register-orders.js

      - name: Upload screenshots (성공·실패 모두)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: bot/screenshots/
          if-no-files-found: ignore
          retention-days: 7
