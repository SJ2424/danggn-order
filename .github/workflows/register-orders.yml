name: Register OMS orders

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: '시험 모드 (체크하면 실제 등록 X, 화면 캡처만)'
        type: boolean
        default: false
  schedule:
    # 평일 4회 — 분산 등록 (12:55 OMS 마감 전 최대한 분산)
    - cron: '0 23 * * 0-4'   # 08:00 KST (전날 23:00 UTC) — 새벽~오전 모인 거
    - cron: '0 3 * * 1-5'    # 12:00 KST — 점심 직전 1차
    - cron: '30 3 * * 1-5'   # 12:30 KST — 점심 직전 2차
    - cron: '51 3 * * 1-5'   # 12:51 KST — 마감 직전 막판

# 동시 실행 방지 — 한 인스턴스가 도는 중에 다음 cron 트리거되면 큐에 대기
concurrency:
  group: register-orders
  cancel-in-progress: false

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install bot dependencies
        working-directory: bot
        run: npm install

      - name: Install Playwright Chromium
        working-directory: bot
        run: npx playwright install --with-deps chromium

      - name: Run register bot
        working-directory: bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OMS_USERNAME: ${{ secrets.OMS_USERNAME }}
          OMS_PASSWORD: ${{ secrets.OMS_PASSWORD }}
          # 푸시 알림용 (등록 직후 관리자에게 '결제하세요' 알림 보냄)
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: node register-orders.js

      - name: Upload screenshots (성공·실패 모두)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: bot/screenshots/
          if-no-files-found: ignore
          retention-days: 7
