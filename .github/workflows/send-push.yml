name: Send deadline push

on:
  workflow_dispatch:
  schedule:
    # 평일 2회 — 13:00 마감 대비 (11:50 발주 완료 후)
    # 12:02: 발주 완료 → OMS 결제 시작 신호 (금액·건수)
    # 12:45: 마감 15분 전 마지막 콜 (미결제 + 수동 처리 막판 경고)
    - cron: '2 3 * * 1-5'    # 12:02 KST
    - cron: '45 3 * * 1-5'   # 12:45 KST

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        working-directory: bot
        run: npm install
      - name: Send push
        working-directory: bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          MANUAL_RUN: ${{ github.event_name == 'workflow_dispatch' }}
        run: node send-push.js
