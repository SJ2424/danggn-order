name: Send deadline push

on:
  workflow_dispatch:
  schedule:
    # 평일 2회 — 13:00 마감 대비
    # 12:35: 마감 25분 전 (등록 완료 → 결제 시작 신호)
    # 12:50: 마감 10분 전 (마지막 콜 — 12:47 발주 막판 직후 + 결제 안 한 사람 행동 유도)
    - cron: '35 3 * * 1-5'   # 12:35 KST
    - cron: '50 3 * * 1-5'   # 12:50 KST

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        working-directory: bot
        run: npm install
      - name: Send push
        working-directory: bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          MANUAL_RUN: ${{ github.event_name == 'workflow_dispatch' }}
        run: node send-push.js
