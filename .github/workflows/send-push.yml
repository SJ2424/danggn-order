name: Send deadline push

on:
  workflow_dispatch:
  schedule:
    # 평일 3회 — 13:00 마감 대비 (결제·입금 안 된 게 있으면 계속 상기)
    # 12:00 / 12:30 / 12:50 (offset 2분 — 정시 트래픽 지연 회피, 12:50은 그대로)
    # send-push.js가 행동 필요한 게 0건이면 자동 skip → 다 됐으면 알람 안 옴
    - cron: '2 3 * * 1-5'    # 12:02 KST — 발주 완료 → 결제 시작
    - cron: '32 3 * * 1-5'   # 12:32 KST — 중간 점검
    - cron: '50 3 * * 1-5'   # 12:50 KST — 마감 10분 전 마지막 콜

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        working-directory: bot
        run: npm install
      - name: Send push
        working-directory: bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          MANUAL_RUN: ${{ github.event_name == 'workflow_dispatch' }}
        run: node send-push.js
